# ── Trigger ───────────────────────────────────────────────────────────────────
trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md
      - .gitignore

# ── Variables ─────────────────────────────────────────────────────────────────
variables:
  acrName: 'acrdevopsdemo2025'
  acrLoginServer: 'acrdevopsdemo2025.azurecr.io'
  imageName: 'azuredevopsdemo'
  imageTag: '$(Build.BuildId)'
  webAppName: 'app-dotnet-cicd-dev'
  resourceGroup: 'rg-dotnet-cicd-dev'
  serviceConnection: 'azure-service-connection'
  keyVaultName: 'kv-dotnet-cicd-dev'

# ── Stages ────────────────────────────────────────────────────────────────────
stages:

# ── Stage 1: Build & Test ─────────────────────────────────────────────────────
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: BuildAndTest
    displayName: 'Build, Test and Push Docker Image'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    # Fetch secrets from Key Vault
    - task: AzureKeyVault@2
      displayName: 'Fetch secrets from Key Vault'
      inputs:
        azureSubscription: '$(serviceConnection)'
        KeyVaultName: '$(keyVaultName)'
        SecretsFilter: 'AcrUsername,AcrPassword,AppInsightsConnectionString'
        RunAsPreJob: false

    # Run dotnet tests
    - task: DotNetCoreCLI@2
      displayName: 'Run Unit Tests'
      inputs:
        command: 'test'
        projects: '**/AzureDevOpsDemo.Tests/*.csproj'
        arguments: '--configuration Release --verbosity minimal'

    # Login to ACR
    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: 'login'
        containerRegistry: '$(acrLoginServer)'
      env:
        DOCKER_USERNAME: $(AcrUsername)
        DOCKER_PASSWORD: $(AcrPassword)

    # Build and Push Docker image
    - task: AzureCLI@2
      displayName: 'Build and Push Docker Image to ACR'
      inputs:
        azureSubscription: '$(serviceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Login to ACR
          az acr login --name $(acrName)

          # Build image
          docker build -t $(acrLoginServer)/$(imageName):$(imageTag) .
          docker build -t $(acrLoginServer)/$(imageName):latest .

          # Push both tags
          docker push $(acrLoginServer)/$(imageName):$(imageTag)
          docker push $(acrLoginServer)/$(imageName):latest

          echo "✅ Image pushed: $(acrLoginServer)/$(imageName):$(imageTag)"

    # Publish pipeline artifact
    - task: PublishPipelineArtifact@1
      displayName: 'Publish Pipeline Artifact'
      inputs:
        targetPath: '$(Pipeline.Workspace)'
        artifact: 'drop'
        publishLocation: 'pipeline'

# ── Stage 2: Deploy ───────────────────────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Azure App Service'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployToAppService
    displayName: 'Deploy to App Service'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:

          # Fetch secrets from Key Vault
          - task: AzureKeyVault@2
            displayName: 'Fetch secrets from Key Vault'
            inputs:
              azureSubscription: '$(serviceConnection)'
              KeyVaultName: '$(keyVaultName)'
              SecretsFilter: 'AppInsightsConnectionString'
              RunAsPreJob: false

          # Deploy to App Service
          - task: AzureWebAppContainer@1
            displayName: 'Deploy Container to App Service'
            inputs:
              azureSubscription: '$(serviceConnection)'
              appName: '$(webAppName)'
              containers: '$(acrLoginServer)/$(imageName):$(imageTag)'
              appSettings: |
                -ASPNETCORE_ENVIRONMENT Production
                -ApplicationInsights__ConnectionString $(AppInsightsConnectionString)